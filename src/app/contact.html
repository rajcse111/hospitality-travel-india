<section id="contact" class="contact-section">
  <div class="container contact-container">
    <div class="contact-info">
      <h2>Get In Touch</h2>
      <p>Whether you're a local resident or a visitor, we're here to assist with your lifestyle, travel, and wellness needs across India.</p>
      <div class="contact-details">
        <p><strong>📍 Location:</strong> Delhi NCR, India</p>
        <p><strong>📞 Phone:</strong> <a href="tel:+91XXXXXXXXXX">+918147772613</a></p>
        <p><strong>📧 Email:</strong> <a href="mailto:info@indohospitality.com">info@indohospitality.com</a></p>
      </div>
    </div>
    <div class="contact-form">
      <form>
        <div class="form-group">
          <input type="text" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <input type="email" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <select required>
            <option value="" disabled selected>Select Service Interest</option>
            <option value="accommodation">Accommodation Assistance</option>
            <option value="food">Food & Dining</option>
            <option value="transportation">Local Transportation</option>
            <option value="ayurveda">Ayurvedic Wellness</option>
            <option value="yoga">Yoga & Mental Wellness</option>
            <option value="entertainment">Entertainment</option>
            <option value="concierge">Concierge Services</option>
          </select>
        </div>
        <div class="form-group">
          <textarea rows="5" placeholder="Tell us more about your requirements"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send Request</button>
      </form>
    </div>
  </div>
</section>
