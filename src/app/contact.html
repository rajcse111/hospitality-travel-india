<section id="contact" class="contact-section">
  <div class="container contact-container">
    <div class="contact-info">
      <h2>Get In Touch</h2>
      <p>Whether you're a local resident or a visitor, we're here to assist with your event management, travel, and hospitality needs across Delhi/NCR.</p>
      <div class="contact-details">
        <p><strong>📍 Location:</strong> Delhi NCR, India</p>
        <p><strong>📞 Phone:</strong> <a href="tel:+91XXXXXXXXXX">+91 XXXXX XXXXX</a></p>
        <p><strong>💬 WhatsApp:</strong> <a href="https://wa.me/91XXXXXXXXXX" target="_blank">+91 XXXXX XXXXX</a></p>
        <p><strong>📧 Email:</strong> <a href="mailto:info@indohospitality.com">info@indohospitality.com</a></p>
      </div>
    </div>
    <div class="contact-form">
      <form>
        <div class="form-group">
          <input type="text" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <input type="email" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <select required>
            <option value="" disabled selected>Select Service Interest</option>
            <option value="event-management">General Event Management</option>
            <option value="mufta-party">MUFTA Party (Entertainment)</option>
            <option value="conferences">Conferences & Seminars</option>
            <option value="exhibitions">Exhibitions & Trade Fairs</option>
            <option value="weddings">Destination Weddings</option>
            <option value="corporate">Corporate Gala & Events</option>
            <option value="hospitality">Hospitality & Travel Assistance</option>
            <option value="wellness">Wellness & Recreation</option>
            <option value="concierge">Concierge Services</option>
          </select>
        </div>
        <div class="form-group">
          <textarea rows="5" placeholder="Tell us more about your requirements"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Send Request</button>
      </form>
    </div>
  </div>
</section>
